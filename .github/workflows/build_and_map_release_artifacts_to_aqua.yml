name: build_and_map_release_artifacts_to_aqua

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build, Test and Generate Manifest
    runs-on: ubuntu-latest

    env:
      tag-version: ${{ github.sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      - name: Build Application
        run: ./mvnw clean install -DskipTests -Ddependency-check.skip=true

      - name: Run Tests
        run: ./mvnw test

      - name: Build Docker Image
        run: |
          docker build -t wrongsecrets:${{ env.tag-version }} .

      - name: Manifest Generation
        run: |
          export BILLY_SERVER=https://billy.eu-1.codesec.aquasec.com
          curl -sLo install.sh download.codesec.aquasec.com/billy/install.sh
          curl -sLo install.sh.checksum https://github.com/argonsecurity/releases/releases/latest/download/install.sh.checksum

          if ! cat install.sh.checksum | sha256sum --check; then
            echo "install.sh checksum failed"
            exit 1
          fi

          BINDIR="." sh install.sh
          rm install.sh install.sh.checksum

          ./billy generate \
            --access-token "${{ secrets.GITHUB_TOKEN }}" \
            --aqua-key "${{ secrets.AQUA_KEY }}" \
            --aqua-secret "${{ secrets.AQUA_SECRET }}" \
            --cspm-url https://eu-1.api.cloudsploit.com \
            --artifact-path "wrongsecrets:${{ env.tag-version }}"

      - name: Run Aqua Scanner
        uses: docker://aquasec/aqua-scanner
        with:
          args: trivy image wrongsecrets:${{ env.tag-version }}
